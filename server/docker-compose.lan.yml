services:
  api:
    env_file:
      - path: .env
        required: false
    environment:
      MEDIA_ROOT: /data/media
    volumes:
      - ${ONGAKU_DATA_ROOT:-/data/animeongaku}/media:/data/media
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

  db:
    env_file:
      - path: .env
        required: false
    volumes:
      - ${ONGAKU_DATA_ROOT:-/data/animeongaku}/postgres:/var/lib/postgresql/data
