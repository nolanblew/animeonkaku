name: Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g. 1.0.1) (Leave empty to auto-bump patch version)'
        required: false
        type: string
      version_code:
        description: 'Version Code (e.g. 2) (Leave empty to auto-bump code)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Need full history for tags/commits
        
    - name: set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: ./src

    - name: Update Version in build.gradle.kts
      working-directory: ./src
      run: |
        if [ -n "${{ github.event.inputs.version_name }}" ] && [ -n "${{ github.event.inputs.version_code }}" ]; then
          echo "Using provided version inputs"
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.event.inputs.version_code }}/" app/build.gradle.kts
          sed -i 's/versionName = "[^"]*"/versionName = "${{ github.event.inputs.version_name }}"/' app/build.gradle.kts
          sed -i 's/buildConfigField("String", "DISPLAY_VERSION", "[^"]*")/buildConfigField("String", "DISPLAY_VERSION", "\"${{ github.event.inputs.version_name }}\"")/' app/build.gradle.kts
        else
          echo "Auto-bumping version"
          python3 << 'PYEOF'
        import re

        with open('app/build.gradle.kts', 'r') as f:
            content = f.read()

        m = re.search(r'versionCode = (\d+)', content)
        if m:
            new_code = int(m.group(1)) + 1
            content = re.sub(r'versionCode = \d+', f'versionCode = {new_code}', content)
            print(f'Bumped versionCode to {new_code}')

        m = re.search(r'versionName = "(\d+\.\d+(?:\.\d+)?)"', content)
        if m:
            current = m.group(1)
            parts = current.split('.')
            if len(parts) == 2:
                new_name = f'{parts[0]}.{parts[1]}.1'
            else:
                new_name = f'{parts[0]}.{parts[1]}.{int(parts[2])+1}'
            content = content.replace(f'versionName = "{current}"', f'versionName = "{new_name}"')
            content = content.replace(f'DISPLAY_VERSION", "\\"{current}\\""', f'DISPLAY_VERSION", "\\"{new_name}\\""')
            print(f'Bumped versionName to {new_name}')

        with open('app/build.gradle.kts', 'w') as f:
            f.write(content)
        PYEOF
        fi

    - name: Get Final Version
      id: get_version
      working-directory: ./src
      run: |
        VERSION_NAME=$(grep -oP 'versionName = "\K[^"]*' app/build.gradle.kts)
        echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV
        echo "Extracted version: $VERSION_NAME"

    - name: Commit Version Bump
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add src/app/build.gradle.kts
        git commit -m "chore: bump version to ${{ env.VERSION_NAME }}" || echo "No changes to commit"
        git push origin HEAD:${{ github.ref }} || echo "No changes to push"

    - name: Decode Keystore
      working-directory: ./src
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        echo $KEYSTORE_BASE64 | base64 --decode > release.keystore

    - name: Decode google-services.json
      working-directory: ./src/app
      env:
        GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_BASE64 }}
      run: |
        echo $GOOGLE_SERVICES_BASE64 | base64 --decode > google-services.json

    - name: Build Release APK and AAB
      working-directory: ./src
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/src/release.keystore
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        ./gradlew assembleRelease bundleRelease

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION_NAME }}
        name: Release v${{ env.VERSION_NAME }}
        generate_release_notes: true
        files: |
          src/app/build/outputs/apk/release/*.apk
          src/app/build/outputs/bundle/release/*.aab
